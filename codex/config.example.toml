# Enable hooks if supported by your Codex version.
[features]
hooks = true

[mcp_servers.frontload]
command = "frontload"
args = ["mcp", "--repo", "."]
startup_timeout_sec = 20
tool_timeout_sec = 120
enabled = true
required = true
enabled_tools = [
  "fl_policy",
  "fl_repo_index",
  "fl_repo_dossier",
  "fl_search",
  "fl_read_budgeted",
  "fl_run_summary",
  "fl_git_diff_summary",
  "fl_budget_report",
  "fl_local_scout"
]
default_tools_approval_mode = "prompt"

[mcp_servers.frontload_global]
command = "frontload"
args = ["mcp", "--repo", "."]
startup_timeout_sec = 20
tool_timeout_sec = 120
enabled = false

# Codex config keys can vary by version. If your Codex build rejects
# required, enabled_tools, or default_tools_approval_mode, remove that key
# and keep the command/args MCP server stanza.
